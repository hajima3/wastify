databases:
  - name: wastify-db
    plan: free
    databaseName: wastify
    user: wastify_user

services:
  - type: web
    name: wastify-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wastify-db
          property: connectionString
